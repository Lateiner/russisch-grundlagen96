<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironie-Detektor: Russisch</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --irony-color: #9b59b6;
            --serious-color: #2980b9;
            --bg-color: #f0f3f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .detector-card {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.4s;
        }

        .scenario-box {
            background: #f8f9fa;
            border-left: 5px solid var(--secondary-color);
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            border-radius: 0 10px 10px 0;
        }

        .context-desc {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-style: italic;
        }

        .russian-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-mode {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-serious { color: var(--serious-color); }
        .btn-ironic { color: var(--irony-color); }

        .btn-mode:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #f0f8ff;
        }

        .btn-mode.selected-correct {
            background-color: var(--correct-color) !important;
            color: white !important;
            border-color: var(--correct-color) !important;
        }

        .btn-mode.selected-incorrect {
            background-color: var(--incorrect-color) !important;
            color: white !important;
            border-color: var(--incorrect-color) !important;
        }

        #feedback {
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: 500;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        .feedback-correct { background-color: #d5f5e3; color: #196f3d; }
        .feedback-incorrect { background-color: #fadbd8; color: #943126; }

        .btn-next {
            margin-top: 25px;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            display: none;
        }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            .russian-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="detector-card">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        
        <div class="scenario-box">
            <div class="context-desc" id="context-text">Lade Situation...</div>
            <div class="russian-text" id="russian-text">...</div>
        </div>

        <div class="options-grid">
            <button class="btn-mode btn-serious" id="btn-serious" onclick="handleChoice(false)">
                <span>👔</span>
                <span>Ernst / Offiziell</span>
            </button>
            <button class="btn-mode btn-ironic" id="btn-ironic" onclick="handleChoice(true)">
                <span>😏</span>
                <span>Ironisch / Scherzhaft</span>
            </button>
        </div>

        <div id="feedback"></div>

        <button class="btn-next" id="next-btn" onclick="nextQuestion()">Nächste Situation</button>
        <button class="btn-next" id="restart-btn" style="background: var(--secondary-color)" onclick="initQuiz()">Neu starten</button>
    </div>

    <script>
        const quizData = [
            {
                context: "Ein Kollege kommt nach mehreren Fehltagen endlich wieder ins Büro. Ein anderer Kollege sagt:",
                text: "„Ну, наконец-то он изъявил желание прийти на работу!“",
                isIronic: true,
                explanation: "<b>Ironisch!</b> Da ИЗЪЯВИТЬ ein sehr gehobenes Verb ist, wirkt es hier lustig. Es klingt so, als hätte der Kollege sich wie ein Adliger dazu herabgelassen, endlich zu erscheinen."
            },
            {
                context: "In den offiziellen Abendnachrichten wird über einen Staatsbesuch berichtet:",
                text: "„Президент изъявил готовность к мирным переговорам.“",
                isIronic: false,
                explanation: "<b>Ernst / Offiziell.</b> In der Politik und in Nachrichten ist ИЗЪЯВИТЬ der Standardbegriff, um Bereitschaft oder Willen formell auszudrücken."
            },
            {
                context: "Ein Mitbewohner hat tagelang den Abwasch ignoriert und fängt nun plötzlich an zu spülen. Du sagst:",
                text: "„О, наш принц изъявил согласие помыть посуду!“",
                isIronic: true,
                explanation: "<b>Ironisch!</b> Durch die Kombination von 'Prinz' und dem feierlichen Verb ИЗЪЯВИТЬ machst du dich darüber lustig, dass er endlich mithilft."
            },
            {
                context: "In einem förmlichen Geschäftsbrief schreibt eine Firma an eine andere:",
                text: "„Наша компания изъявляет желание инвестировать в проект.“",
                isIronic: false,
                explanation: "<b>Ernst / Offiziell.</b> Dies ist typisches Amtsrussisch (Канцелярит). Es drückt eine formelle Absichtserklärung aus."
            },
            {
                context: "Dein Freund schläft bis Mittag, während alle anderen schon arbeiten. Als er aufsteht, sagst du:",
                text: "„Наконец-то ты изъявил желание проснуться!“",
                isIronic: true,
                explanation: "<b>Ironisch!</b> Man benutzt die 'hohe Sprache' für eine banale Alltagssituation, um den Freund neckisch als faul darzustellen."
            },
            {
                context: "In einem offiziellen Protokoll eines Gerichtstermins steht:",
                text: "„Свидетель изъявил желание дать показания.“",
                isIronic: false,
                explanation: "<b>Ernst / Offiziell.</b> Vor Gericht oder bei Behörden wird ИЗЪЯВИТЬ genutzt, um den formalen Wunsch einer Person festzuhalten."
            }
        ];

        let currentIndex = 0;
        let canClick = true;

        function initQuiz() {
            currentIndex = 0;
            quizData.sort(() => Math.random() - 0.5);
            document.getElementById('restart-btn').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            canClick = true;
            const data = quizData[currentIndex];
            
            document.getElementById('progress-fill').style.width = ((currentIndex / quizData.length) * 100) + "%";
            document.getElementById('context-text').textContent = data.context;
            document.getElementById('russian-text').textContent = data.text;
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const buttons = document.querySelectorAll('.btn-mode');
            buttons.forEach(btn => {
                btn.classList.remove('selected-correct', 'selected-incorrect');
                btn.disabled = false;
            });
        }

        function handleChoice(studentChoice) {
            if (!canClick) return;
            canClick = false;

            const data = quizData[currentIndex];
            const feedback = document.getElementById('feedback');
            const btnSerious = document.getElementById('btn-serious');
            const btnIronic = document.getElementById('btn-ironic');
            
            const correctBtn = data.isIronic ? btnIronic : btnSerious;
            const chosenBtn = studentChoice ? btnIronic : btnSerious;

            feedback.style.display = 'block';
            feedback.innerHTML = data.explanation;

            if (studentChoice === data.isIronic) {
                chosenBtn.classList.add('selected-correct');
                feedback.className = 'feedback-correct';
            } else {
                chosenBtn.classList.add('selected-incorrect');
                correctBtn.classList.add('selected-correct');
                feedback.className = 'feedback-incorrect';
            }

            if (currentIndex < quizData.length - 1) {
                document.getElementById('next-btn').style.display = 'block';
            } else {
                document.getElementById('progress-fill').style.width = "100%";
                document.getElementById('restart-btn').style.display = 'block';
            }
        }

        function nextQuestion() {
            currentIndex++;
            showQuestion();
        }

        // Start
        initQuiz();
    </script>
</body>
</html>
