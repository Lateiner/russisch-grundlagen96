<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontext-Training: ПРЕДЪЯВЛЯТЬ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s;
        }

        .visual-box {
            width: 100%;
            height: 160px;
            background-color: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        svg { height: 100%; max-width: 120px; }

        h2 { font-size: 1.2rem; margin-bottom: 15px; min-height: 3rem; display: flex; align-items: center; justify-content: center; }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
        .option-btn.incorrect { background-color: var(--incorrect-color); border-color: var(--incorrect-color); color: white; }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            min-height: 60px;
            display: none;
        }

        .controls { margin-top: 25px; display: flex; gap: 10px; justify-content: center; }

        button.main-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
        }

        #next-btn { background: var(--secondary-color); display: none; }

        @media (max-width: 480px) {
            .option-btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="visual-box" id="visual-box">
            <!-- SVG wird per JS eingefügt -->
        </div>

        <h2 id="scenario-text">Lade Aufgabe...</h2>

        <div id="feedback"></div>

        <div class="options-container" id="options-list"></div>

        <div class="controls">
            <button class="main-btn" onclick="resetGame()">Neu starten</button>
            <button class="main-btn" id="next-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
        </div>
    </div>

    <script>
        const scenarios = [
            {
                text: "Sie sind beim Arzt und müssen für die Behandlung bezahlen.",
                correct: "предъявить счёт",
                wrong: "изъявить счёт",
                svg: '<rect x="30" y="10" width="40" height="60" fill="white" stroke="#333" stroke-width="2"/><path d="M35 30 h30 M35 40 h30" stroke="#eee"/><text x="50" y="60" font-size="10" text-anchor="middle">RUB</text><circle cx="20" cy="80" r="10" fill="none" stroke="#e74c3c" stroke-width="3"/>',
                explanation: "Richtig! Bei Rechnungen (offiziellen Forderungen) nutzt man предъявлять."
            },
            {
                text: "Ein Paket liegt bei der Post für Sie bereit.",
                correct: "предъявить паспорт",
                wrong: "изъявить паспорт",
                svg: '<rect x="20" y="20" width="60" height="40" fill="#3498db" rx="3"/><circle cx="40" cy="40" r="8" fill="white" opacity="0.3"/><rect x="55" y="35" width="15" height="2" fill="white"/>',
                explanation: "Korrekt! Dokumente zur Identifikation werden immer предъявлены."
            },
            {
                text: "Sie stehen am Werkstor und der Wachmann möchte Ihren Ausweis sehen.",
                correct: "предъявить пропуск",
                wrong: "изъявить пропуск",
                svg: '<rect x="40" y="30" width="20" height="50" fill="#2c3e50"/><circle cx="50" cy="20" r="8" fill="#2c3e50"/><rect x="10" y="45" width="30" height="4" fill="#bdc3c7"/>',
                explanation: "Richtig! Ein Passierschein (пропуск) wird vorgezeigt (предъявить)."
            },
            {
                text: "Nach einem Unfall fordern Sie offiziell Schadensersatz.",
                correct: "предъявить требования",
                wrong: "изъявить требования",
                svg: '<path d="M10 80 L40 60 L70 80 Z" fill="#e74c3c"/><path d="M40 80 L70 60 L100 80 Z" fill="#3498db"/><text x="50" y="40" font-weight="bold" fill="#e74c3c">!</text>',
                explanation: "Genau! Rechtliche Ansprüche oder Forderungen werden предъявлены."
            },
            {
                text: "Der Kontrolleur im Bus bittet um Ihre Fahrkarte.",
                correct: "предъявить билет",
                wrong: "изъявить билет",
                svg: '<rect x="20" y="30" width="60" height="30" fill="#f1c40f" rx="2"/><path d="M30 45 h40" stroke="white" stroke-dasharray="2"/><circle cx="15" cy="45" r="3" fill="#333"/>',
                explanation: "Richtig! Fahrkarten zur Kontrolle vorzeigen heißt предъявить билет."
            },
            {
                text: "Eine letzte, offizielle Warnung oder Forderung wird ausgesprochen.",
                correct: "предъявить ультиматум",
                wrong: "изъявить ультиматум",
                svg: '<rect x="20" y="20" width="60" height="60" fill="#333"/><text x="50" y="55" fill="white" font-size="20" text-anchor="middle">!</text>',
                explanation: "Korrekt! Ein Ultimatum ist eine offizielle Forderung: предъявить."
            }
        ];

        let currentOrder = [];
        let currentIndex = 0;
        let canClick = true;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            currentOrder = shuffle([...Array(scenarios.length).keys()]);
            currentIndex = 0;
            showQuestion();
        }

        function showQuestion() {
            canClick = true;
            const scenario = scenarios[currentOrder[currentIndex]];
            
            document.getElementById('progress-bar').style.width = ((currentIndex + 1) / scenarios.length * 100) + "%";
            document.getElementById('visual-box').innerHTML = `<svg viewBox="0 0 100 100">${scenario.svg}</svg>`;
            document.getElementById('scenario-text').textContent = scenario.text;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';

            const btns = [
                { text: scenario.correct, isCorrect: true },
                { text: scenario.wrong, isCorrect: false }
            ];

            shuffle(btns).forEach(data => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = data.text;
                btn.onclick = () => handleChoice(btn, data.isCorrect, scenario.explanation);
                optionsList.appendChild(btn);
            });
        }

        function handleChoice(btn, isCorrect, explanation) {
            if (!canClick) return;
            
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            feedback.textContent = explanation;

            if (isCorrect) {
                btn.classList.add('correct');
                feedback.style.backgroundColor = "#d5f5e3";
                feedback.style.color = "#196f3d";
                canClick = false;
                document.getElementById('next-btn').style.display = 'block';
                if (currentIndex === scenarios.length - 1) {
                    document.getElementById('next-btn').textContent = "Abschließen";
                }
            } else {
                btn.classList.add('incorrect');
                feedback.style.backgroundColor = "#fadbd8";
                feedback.style.color = "#943126";
                feedback.textContent = "Leider falsch. Überlege: Geht es um ein Dokument/Anspruch oder ein Gefühl?";
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < scenarios.length) {
                showQuestion();
            } else {
                document.getElementById('scenario-text').textContent = "Glückwunsch! Du hast alle Szenarien gemeistert.";
                document.getElementById('options-list').innerHTML = '';
                document.getElementById('visual-box').innerHTML = '🏆';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('feedback').textContent = "Du weißt jetzt genau, wann man ПРЕДЪЯВЛЯТЬ verwendet.";
            }
        }

        function resetGame() {
            document.getElementById('next-btn').textContent = "Nächste Aufgabe";
            initGame();
        }

        // Start
        initGame();
    </script>
</body>
</html>
