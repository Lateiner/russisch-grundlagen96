<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot-Suche: ПРЕДЪЯВИТЬ ПАСПОРТ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; text-align: center; }
        .instruction { max-width: 600px; text-align: center; margin-bottom: 20px; font-size: 1rem; color: #555; }

        #feedback-area {
            width: 100%;
            max-width: 900px;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #bdc3c7;
            background: #fff;
            transition: all 0.3s;
        }

        .scenes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 850px) { .scenes-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .scenes-grid { grid-template-columns: 1fr; } }

        .scene-card {
            background: white;
            border: 4px solid transparent;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .scene-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); }

        .scene-card.selected-correct { border-color: var(--correct-color); background-color: #f0fff4; }
        .scene-card.selected-incorrect { border-color: var(--incorrect-color); background-color: #fff5f5; }

        .scene-image {
            width: 100%;
            height: 140px;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .scene-label {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }

        .btn-reset {
            margin-top: 30px;
            padding: 12px 35px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        svg { width: 100%; height: 100%; max-height: 90px; }
    </style>
</head>
<body>

    <h1>Kontext-Suche: ПРЕДЪЯВИТЬ ПАСПОРТ</h1>
    <p class="instruction">Finde die 2 Situationen, in denen man offiziell seinen Reisepass vorzeigen muss.</p>

    <div id="feedback-area">Wähle eine Szene aus...</div>

    <div id="grid" class="scenes-grid">
        <!-- Szenen werden per JS gemischt eingefügt -->
    </div>

    <button class="btn-reset" onclick="resetGame()">Neu starten & mischen</button>

    <script>
        const sceneData = [
            {
                id: 1,
                status: 'correct',
                label: 'Postfiliale',
                message: 'Richtig! In Russland muss man bei der Post ПРЕДЪЯВИТЬ ПАСПОРТ, um Pakete abzuholen.',
                svg: '<rect x="10" y="30" width="80" height="50" fill="#3498db" rx="2" /><text x="50" y="60" fill="white" font-family="Arial" font-size="8" text-anchor="middle">ПОЧТА</text><rect x="70" y="40" width="10" height="10" fill="#f1c40f" />'
            },
            {
                id: 2,
                status: 'correct',
                label: 'Flughafen / Zoll',
                message: 'Richtig! Am Flughafen bei der Grenzkontrolle muss man ПРЕДЪЯВИТЬ ПАСПОРТ.',
                svg: '<path d="M20 80 L80 80 M50 20 L50 80" stroke="#2c3e50" stroke-width="2"/><rect x="35" y="40" width="30" height="20" fill="#27ae60" rx="2" /><text x="50" y="53" fill="white" font-size="6" text-anchor="middle">CONTROL</text><path d="M10 30 Q50 10 90 30" fill="none" stroke="#3498db" />'
            },
            {
                id: 3,
                status: 'wrong',
                label: 'Sicherheitskontrolle',
                message: 'Nicht ganz. Hier zeigt man meist den Hausausweis: ПРЕДЪЯВИТЬ ПРОПУСК.',
                svg: '<circle cx="50" cy="30" r="15" fill="#2c3e50" /><rect x="30" y="50" width="40" height="40" fill="#2c3e50" /><rect x="40" y="60" width="20" height="15" fill="#bdc3c7" /><text x="50" y="70" font-size="5" text-anchor="middle">ID</text>'
            },
            {
                id: 4,
                status: 'wrong',
                label: 'Verkehrsunfall',
                message: 'Falsch. Nach einem Unfall erhebt man Schadensersatz: ПРЕДЪЯВИТЬ ТРЕБОВАНИЯ.',
                svg: '<rect x="10" y="60" width="30" height="20" fill="#e74c3c" rx="3" /><rect x="60" y="60" width="30" height="20" fill="#3498db" rx="3" /><path d="M40 70 L60 70" stroke="black" stroke-width="2" stroke-dasharray="2" /><text x="50" y="50" fill="#e74c3c" font-weight="bold" font-size="12" text-anchor="middle">!</text>'
            },
            {
                id: 5,
                status: 'wrong',
                label: 'Arztpraxis / Kasse',
                message: 'Falsch. Wenn man eine Zahlungsaufforderung erhält: ПРЕДЪЯВИТЬ СЧЁТ.',
                svg: '<rect x="30" y="20" width="40" height="60" fill="white" stroke="#bdc3c7" stroke-width="2"/><path d="M35 40 h30 M35 50 h30 M35 60 h30" stroke="#bdc3c7" /><text x="50" y="75" font-size="8" text-anchor="middle" fill="#27ae60">RUB</text>'
            },
            {
                id: 6,
                status: 'wrong',
                label: 'Offizielles Treffen',
                message: 'Hier geht es um Gefühle oder Willen: ИЗЪЯВИТЬ ГОТОВНОСТЬ (Bereitschaft bekunden).',
                svg: '<circle cx="35" cy="40" r="10" fill="#95a5a6" /><circle cx="65" cy="40" r="10" fill="#7f8c8d" /><path d="M35 55 L65 55" stroke="#2c3e50" stroke-width="3" /><path d="M40 70 L60 70" stroke="#27ae60" stroke-width="4" />'
            }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffledScenes = shuffle([...sceneData]);

            shuffledScenes.forEach(scene => {
                const card = document.createElement('div');
                card.className = 'scene-card';
                card.onclick = () => checkAnswer(card, scene);
                
                card.innerHTML = `
                    <div class="scene-image">
                        <svg viewBox="0 0 100 100">${scene.svg}</svg>
                    </div>
                    <div class="scene-label">${scene.label}</div>
                `;
                grid.appendChild(card);
            });
        }

        function checkAnswer(card, scene) {
            const feedback = document.getElementById('feedback-area');
            
            // Markierung setzen
            if (scene.status === 'correct') {
                card.classList.add('selected-correct');
                card.classList.remove('selected-incorrect');
                feedback.style.borderColor = "var(--correct-color)";
                feedback.style.color = "#196f3d";
            } else {
                card.classList.add('selected-incorrect');
                card.classList.remove('selected-correct');
                feedback.style.borderColor = "var(--incorrect-color)";
                feedback.style.color = "#943126";
            }

            feedback.textContent = scene.message;
        }

        function resetGame() {
            const feedback = document.getElementById('feedback-area');
            feedback.textContent = "Wähle eine Szene aus...";
            feedback.style.borderColor = "#bdc3c7";
            feedback.style.color = "var(--primary-color)";
            initBoard();
        }

        // Start
        initBoard();
    </script>
</body>
</html>
