<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Memory: ПРЕДЪЯВИТЬ & ИЗЪЯВИТЬ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; text-align: center; font-size: 1.6rem; }
        p { margin-bottom: 20px; text-align: center; max-width: 600px; font-size: 0.95rem; }

        .game-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            perspective: 1000px;
        }

        @media (max-width: 600px) { .game-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 400px) { .game-container { grid-template-columns: repeat(2, 1fr); } }

        .card {
            aspect-ratio: 1 / 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.5s ease-out;
        }

        .card.flipped { transform: rotateY(180deg); }

        /* Animation für das Verschwinden */
        .card.matched {
            pointer-events: none;
            opacity: 0;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #bdc3c7;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-back { background-color: var(--secondary-color); color: white; }
        .card-front { background-color: white; transform: rotateY(180deg); }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: opacity 0.3s;
        }

        .btn-reset { background-color: var(--primary-color); }
        .btn-solution { background-color: #e67e22; }
        button:hover { opacity: 0.8; }

        #message {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            height: 24px;
        }
    </style>
</head>
<body>

    <h1>Memory: ПРЕДЪЯВИТЬ vs. ИЗЪЯВИТЬ</h1>
    <p>Finde die Paare. Korrekte Paare verschwinden langsam vom Feld.</p>

    <div id="game-board" class="game-container"></div>

    <div id="message"></div>

    <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Neu starten</button>
        <button class="btn-solution" onclick="showSolution()">Lösung anzeigen</button>
    </div>

    <script>
        const pairs = [
            { ru: "ПРЕДЪЯВИТЬ", de: "vorzeigen" },
            { ru: "ИЗЪЯВИТЬ", de: "bekunden" },
            { ru: "ПРЕДЪЯВИТЬ ПАСПОРТ", de: "den Pass vorzeigen" },
            { ru: "ИЗЪЯВИТЬ ЖЕЛАНИЕ", de: "einen Wunsch äußern" },
            { ru: "ПРЕДЪЯВИТЬ СЧЁТ", de: "die Rechnung präsentieren" },
            { ru: "ИЗЪЯВИТЬ СОГЛАСИЕ", de: "Zustimmung bekunden" },
            { ru: "ПРЕДЪЯВИТЬ ТРЕБОВАНИЕ", de: "eine Forderung stellen" },
            { ru: "ИЗЪЯВИТЬ ГОТОВНОСТЬ", de: "Bereitschaft zeigen" }
        ];

        // Farben für die Lösung (8 Paare)
        const solutionColors = [
            "#FFADAD", "#FFD6A5", "#FDFFB6", "#CAFFBF", 
            "#9BF6FF", "#A0C4FF", "#BDB2FF", "#FFC6FF"
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let canClick = true;

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            let deck = [];
            
            pairs.forEach((pair, index) => {
                deck.push({ text: pair.ru, pairIndex: index });
                deck.push({ text: pair.de, pairIndex: index });
            });

            deck.sort(() => Math.random() - 0.5);

            deck.forEach(cardData => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.index = cardData.pairIndex;
                
                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front">${cardData.text}</div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canClick || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            canClick = false;
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.index === card2.dataset.index) {
                matchedCount++;
                // Verzögerung, damit man die zweite Karte noch kurz sieht
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    canClick = true;
                    if (matchedCount === pairs.length) {
                        document.getElementById('message').textContent = "Ausgezeichnet! Alles gefunden.";
                    }
                }, 600);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canClick = true;
                }, 1000);
            }
        }

        function showSolution() {
            canClick = false;
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                card.classList.remove('matched');
                card.style.opacity = "1";
                card.classList.add('flipped');
                const color = solutionColors[card.dataset.index];
                card.querySelector('.card-front').style.backgroundColor = color;
                card.querySelector('.card-front').style.borderColor = color;
            });
            document.getElementById('message').textContent = "Lösungsübersicht aktiviert.";
        }

        function resetGame() {
            matchedCount = 0;
            canClick = true;
            flippedCards = [];
            document.getElementById('message').textContent = "";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
